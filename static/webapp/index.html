<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>拼圖定位助手</title>
<style>
  :root{
    --blue:#2563eb; --blue2:#2152d6; --ink:#0f172a; --muted:#64748b; --soft:#94a3b8;
    --line:#e8ebf2; --line2:#e2e6ee; --bg:#f7f8fb; --ok:#16a34a; --okbg:#ecfdf5; --okline:#bbf7d0;
    --danger:#dc2626;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Helvetica Neue",system-ui,sans-serif;
    background:radial-gradient(120% 120% at 50% 0%,#f3f5fa 0%,#e3e6ee 60%,#d8dbe6 100%);
    color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:0;}
  /* 手機框：大螢幕顯示成手機外框；窄螢幕（真手機）滿版 */
  #device{position:relative;width:392px;height:844px;max-height:100vh;background:#0b1020;
    border-radius:52px;padding:11px;box-shadow:0 40px 90px -30px rgba(15,23,42,.55);flex:none;}
  #screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:42px;
    overflow:hidden;display:flex;flex-direction:column;}
  @media (max-width:520px){
    body{padding:0;align-items:stretch;}
    #device{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;box-shadow:none;}
    #screen{border-radius:0;}
  }
  .statusbar{position:relative;z-index:40;height:env(safe-area-inset-top,0);min-height:8px;flex:none;}
  .view{flex:1;min-height:0;display:flex;flex-direction:column;}
  .scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .pad{padding:8px 22px 30px;}
  .eyebrow{font-size:12px;font-weight:600;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase;}
  .h1{font-size:27px;font-weight:800;letter-spacing:-.5px;margin-top:2px;}
  .h2{font-size:21px;font-weight:800;}
  .section{font-size:13px;font-weight:700;color:var(--soft);letter-spacing:.5px;margin:14px 0 12px 2px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px -18px rgba(15,23,42,.4);}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:16px;
    border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;border:none;
    background:linear-gradient(180deg,#2f6bf3,#2152d6);color:#fff;box-shadow:0 14px 28px -12px rgba(37,99,235,.6);}
  .btn.ghost{background:#fff;border:1px solid var(--line2);color:#475569;box-shadow:none;}
  .btn.ok{background:linear-gradient(180deg,#16a34a,#15803d);box-shadow:0 12px 24px -12px rgba(22,163,74,.6);}
  .btn:disabled{opacity:.45;}
  .iconbtn{width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;}
  input,select{font-family:inherit;}
  .field{width:100%;font-size:15px;font-weight:600;color:var(--ink);padding:14px 16px;
    border:1px solid var(--line2);border-radius:14px;background:#fff;outline:none;}
  .hidden{display:none!important;}
  .row{display:flex;gap:10px;}
  .topbar{flex:none;padding:6px 20px 12px;display:flex;align-items:center;gap:12px;}
  .nav{flex:none;display:flex;padding:8px 12px calc(18px + env(safe-area-inset-bottom,0));
    background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid #eef1f6;}
  .navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--soft);}
  .navitem.active{color:var(--blue);}
  .navitem span{font-size:10.5px;font-weight:700;}
  .progressbar{height:7px;border-radius:6px;background:#eef1f6;overflow:hidden;}
  .progressbar>div{height:100%;border-radius:6px;background:linear-gradient(90deg,#3b82f6,#2563eb);}
  /* 相機 / 裁切舞台 */
  #stage{position:relative;width:100%;aspect-ratio:3/4;border-radius:22px;overflow:hidden;background:#0b1020;touch-action:none;}
  #frozen{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;display:none;}
  #cropBox{position:absolute;border:2.5px solid rgba(37,99,235,.95);border-radius:16px;
    box-shadow:0 0 0 9999px rgba(15,23,42,.45);pointer-events:none;}
  .corner{position:absolute;width:22px;height:22px;pointer-events:none;}
  .badge{position:absolute;left:50%;transform:translateX(-50%);background:rgba(15,23,42,.62);
    backdrop-filter:blur(6px);color:#fff;font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;
    white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:6px;}
  .ref-wrap{position:relative;width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;
    background:#0f172a;border:1px solid var(--line2);}
  .ref-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .gridlines{position:absolute;inset:0;pointer-events:none;}
  .cell-marker{position:absolute;background:rgba(22,163,74,.5);box-shadow:inset 0 0 0 .5px rgba(22,163,74,.85);}
  .loc-marker{position:absolute;background:rgba(37,99,235,.42);border:2px solid #fff;
    box-shadow:0 0 0 2px #2563eb,0 0 22px 5px rgba(37,99,235,.6);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:#67e8f9;animation:spin .8s linear infinite;}
  .seg{display:flex;background:#eef1f6;border-radius:13px;padding:4px;gap:4px;}
  .seg>div{flex:1;text-align:center;font-size:12.5px;font-weight:700;padding:9px 4px;border-radius:10px;cursor:pointer;color:var(--muted);}
  .seg>div.on{background:#fff;color:var(--ink);box-shadow:0 2px 8px -3px rgba(15,23,42,.3);}
  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#1f6feb;color:#fff;
    padding:11px 18px;border-radius:22px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;
    max-width:84%;text-align:center;z-index:200;box-shadow:0 12px 30px -10px rgba(0,0,0,.4);}
  #toast.show{opacity:1;}#toast.err{background:#e5484d;}
  .pill{font-size:11px;font-weight:700;padding:4px 11px;border-radius:9px;}
  .empty{text-align:center;color:var(--soft);font-size:14px;padding:40px 20px;line-height:1.7;}
  label.upload{position:relative;width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;
    border:1.5px dashed #c3cbd9;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;}
  label.upload.has{border:1px solid var(--line);}
  label.upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;}
  .stat .n{font-size:26px;font-weight:800;}
  .stat .l{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
  .howto{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px;}
  .howto h3{font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .howto li{list-style:none;display:flex;gap:8px;padding:8px 0;font-size:13.5px;line-height:1.5;border-top:1px solid #f1f3f8;color:#475569;}
  .howto li b{color:var(--ok);}
</style>
</head>
<body>
<div id="device"><div id="screen">
  <div class="statusbar"></div>
  <div id="app" class="view"></div>
</div></div>
<input type="file" id="refInput" accept="image/*" style="display:none">
<input type="file" id="pieceInput" accept="image/*" capture="environment" style="display:none">
<div id="toast"></div>

<script>
"use strict";
const $ = (id)=>document.getElementById(id);
const app = $("app");
const api = {
  async json(url, opts){ const r = await fetch(url, opts); const d = await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||("HTTP "+r.status)); return d; },
  projects(){ return this.json("/api/projects"); },
  project(id){ return this.json("/api/projects/"+id); },
  pieces(id){ return this.json("/api/projects/"+id+"/pieces"); },
};
function toast(msg, err){ const t=$("toast"); t.textContent=msg; t.className="show"+(err?" err":""); clearTimeout(t._t); t._t=setTimeout(()=>t.className="",2800); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
const SVG = {
  back:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
  plus:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
  check:(c="#fff",w=3)=>`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
  cam:`<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3.5"/></svg>`,
  map:`<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>`,
  list:`<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><path d="M4 6h.01M4 12h.01M4 18h.01"/></svg>`,
  gear:`<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>`,
};

// 全域狀態
const S = {
  route: "home",          // home | setup | app
  tab: "capture",         // capture | map | list | settings
  project: null,          // 目前開啟的專案
  pieces: [],             // 目前專案單片
  confirmedCells: [],
  // setup 表單
  form: { name:"", rows:40, cols:25, refFile:null, refURL:null },
  // capture 流程
  cap: { phase:"aim", file:null, located:null, resultStyle:"zoom", markConfirmed:true, pieceId:null },
};

// 規格 presets（列×行）
const PRESETS = [
  { title:"1000 片", sub:"約 40 × 25", rows:40, cols:25 },
  { title:"500 片",  sub:"約 25 × 20", rows:25, cols:20 },
  { title:"300 片",  sub:"約 20 × 15", rows:20, cols:15 },
];

/* ============================ 路由 / 渲染 ============================ */
function render(){
  if(S.route==="home") return renderHome();
  if(S.route==="setup") return renderSetup();
  if(S.route==="app") return renderApp();
}
function setRoute(r){ S.route=r; render(); }

/* ---------------------------- HOME ---------------------------- */
async function renderHome(){
  app.innerHTML = `<div class="scroll pad" id="homeScroll"><div style="margin:6px 0 22px;">
      <div class="eyebrow">Puzzle Locator</div><div class="h1">我的拼圖</div></div>
    <div class="section">專案</div>
    <div id="projList" style="display:flex;flex-direction:column;gap:14px;"></div>
    <div id="newProjBtn" style="margin-top:16px;border:1.5px dashed #c3cbd9;border-radius:20px;padding:18px;
      display:flex;align-items:center;justify-content:center;gap:9px;color:#2563eb;font-weight:700;font-size:15px;
      cursor:pointer;background:rgba(37,99,235,.03);">${SVG.plus} 新增拼圖專案</div></div>`;
  $("newProjBtn").onclick = ()=>{ S.form={name:"",rows:40,cols:25,refFile:null,refURL:null}; setRoute("setup"); };
  const list = $("projList");
  try{
    const { projects } = await api.projects();
    if(!projects.length){ list.innerHTML = `<div class="empty">還沒有專案<br>點下方按鈕新增第一個拼圖專案</div>`; return; }
    list.innerHTML = projects.map(p=>`
      <div class="card" data-id="${p.id}" style="padding:13px;display:flex;gap:14px;align-items:center;cursor:pointer;">
        <div style="width:74px;height:74px;border-radius:14px;flex:none;overflow:hidden;background:#e9edf5;">
          <img src="/api/projects/${p.id}/reference" style="width:100%;height:100%;object-fit:cover;" alt="">
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
          <div style="font-size:12px;color:var(--muted);margin:3px 0 9px;">${p.rows} 列 × ${p.cols} 行 · ${p.pieces} 片</div>
          <div class="progressbar"><div style="width:${p.pct}%;"></div></div>
          <div style="font-size:11px;color:var(--soft);margin-top:5px;font-weight:600;">已定位 ${p.confirmed} / ${p.pieces} 片 · ${p.pct}%</div>
        </div></div>`).join("");
    list.querySelectorAll("[data-id]").forEach(el=>el.onclick=()=>openProject(+el.dataset.id));
  }catch(e){ list.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`; }
}

/* ---------------------------- SETUP ---------------------------- */
function renderSetup(){
  const f = S.form;
  app.innerHTML = `<div class="scroll pad">
    <div class="topbar" style="padding-left:0;padding-right:0;margin-bottom:8px;">
      <div class="iconbtn" id="back">${SVG.back}</div><div class="h2">新增專案</div></div>
    <div class="section" style="color:#334155;margin-left:2px;">專案名稱</div>
    <input id="pname" class="field" placeholder="例如：星空 1000 片" value="${esc(f.name)}" style="margin-bottom:20px;">
    <div class="section" style="color:#334155;margin-left:2px;">拼圖規格</div>
    <div id="presets" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;"></div>
    <div class="row" style="margin-bottom:20px;">
      <div style="flex:1;" class="card"><div style="padding:10px 12px;">
        <div style="font-size:11px;color:var(--soft);font-weight:600;margin-bottom:4px;">列數</div>
        <input id="prows" type="number" min="1" inputmode="numeric" value="${f.rows}" style="width:100%;font-size:20px;font-weight:800;border:none;outline:none;background:transparent;"></div></div>
      <div style="flex:1;" class="card"><div style="padding:10px 12px;">
        <div style="font-size:11px;color:var(--soft);font-weight:600;margin-bottom:4px;">行數</div>
        <input id="pcols" type="number" min="1" inputmode="numeric" value="${f.cols}" style="width:100%;font-size:20px;font-weight:800;border:none;outline:none;background:transparent;"></div></div>
    </div>
    <div id="totalHint" style="font-size:12px;color:var(--muted);margin:-12px 2px 18px;"></div>
    <div class="section" style="color:#334155;margin-left:2px;">完成圖（盒面照片）</div>
    <label class="upload ${f.refURL?'has':''}" id="upload" style="margin-bottom:26px;">
      ${f.refURL?`<img src="${f.refURL}"><div class="badge" style="left:10px;bottom:10px;transform:none;">${SVG.check()} 已選擇完成圖</div>`:
        `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--soft);">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
          <span style="font-size:13px;font-weight:600;">點擊上傳完成圖</span></div>`}
    </label>
    <button class="btn" id="createBtn">建立專案</button></div>`;

  $("back").onclick = ()=>setRoute("home");
  $("pname").oninput = (e)=>f.name=e.target.value;
  const prows=$("prows"), pcols=$("pcols"), totalHint=$("totalHint");
  function updTotal(){ f.rows=+prows.value||0; f.cols=+pcols.value||0; totalHint.textContent = (f.rows>0&&f.cols>0)?`共 ${f.rows*f.cols} 片`:""; drawPresets(); }
  prows.oninput=updTotal; pcols.oninput=updTotal;
  function drawPresets(){
    $("presets").innerHTML = PRESETS.map((p,i)=>{
      const active = f.rows===p.rows && f.cols===p.cols;
      return `<div data-i="${i}" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;cursor:pointer;
        border:1px solid ${active?'#2563eb':'#e8ebf2'};background:${active?'rgba(37,99,235,.06)':'#fff'};">
        <div><div style="font-size:16px;font-weight:700;">${p.title}</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">${p.sub}</div></div>
        <div style="width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
          border:${active?'none':'2px solid #cbd5e1'};background:${active?'#2563eb':'#fff'};">${active?SVG.check():''}</div></div>`;
    }).join("");
    $("presets").querySelectorAll("[data-i]").forEach(el=>el.onclick=()=>{ const p=PRESETS[+el.dataset.i]; f.rows=p.rows; f.cols=p.cols; prows.value=p.rows; pcols.value=p.cols; updTotal(); });
  }
  updTotal();
  $("upload").onclick=(e)=>{ e.preventDefault(); $("refInput").click(); };
  $("createBtn").onclick = createProject;
}
$("refInput").addEventListener("change",(e)=>{
  const file=e.target.files[0]; if(!file) return;
  if(S.form.refURL) URL.revokeObjectURL(S.form.refURL);
  S.form.refFile=file; S.form.refURL=URL.createObjectURL(file);
  $("refInput").value=""; renderSetup();
});
async function createProject(){
  const f=S.form;
  if(!f.name.trim()) return toast("請輸入專案名稱", true);
  if(!(f.rows>=1&&f.cols>=1)) return toast("列數與行數須為正整數", true);
  if(!f.refFile) return toast("請上傳完成圖", true);
  const fd=new FormData(); fd.append("name",f.name.trim()); fd.append("rows",f.rows); fd.append("cols",f.cols); fd.append("reference",f.refFile);
  $("createBtn").disabled=true;
  try{ const proj=await api.json("/api/projects",{method:"POST",body:fd}); toast("專案已建立"); await openProject(proj.id); }
  catch(e){ toast(e.message,true); $("createBtn").disabled=false; }
}

/* ---------------------------- APP（分頁外殼） ---------------------------- */
async function openProject(id){
  try{ S.project = await api.project(id); }
  catch(e){ return toast("無法開啟專案："+e.message, true); }
  S.tab="capture"; S.cap={phase:"aim",file:null,located:null,resultStyle:"zoom",markConfirmed:true,pieceId:null};
  await refreshPieces();
  setRoute("app");
}
async function refreshPieces(){
  if(!S.project) return;
  try{ const d=await api.pieces(S.project.id); S.pieces=d.pieces; S.confirmedCells=d.confirmed_cells; }catch(e){}
  try{ S.project = await api.project(S.project.id); }catch(e){}
}
function renderApp(){
  const p=S.project;
  app.innerHTML = `
    <div class="topbar">
      <div class="iconbtn" id="appBack">${SVG.back}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(p.name)}</div>
        <div style="font-size:12px;color:var(--muted);">${p.rows}×${p.cols} · 已定位 ${p.confirmed} 片</div></div></div>
    <div class="scroll" id="tabBody"></div>
    <div class="nav" id="nav">
      ${navItem("capture","拍照",SVG.cam)}${navItem("map","全圖",SVG.map)}
      ${navItem("list","進度",SVG.list)}${navItem("settings","設定",SVG.gear)}</div>`;
  $("appBack").onclick=()=>setRoute("home");
  $("nav").querySelectorAll("[data-tab]").forEach(el=>el.onclick=()=>{ S.tab=el.dataset.tab; renderApp(); });
  renderTab();
}
function navItem(tab,label,icon){

  for(let i=1;i<rows;i++){ const y=i/rows*100; l+=`<line x1="0" y1="${y}" x2="100" y2="${y}" stroke="rgba(255,255,255,.5)" stroke-width="0.3"/>`; }
  return `<svg class="gridlines" viewBox="0 0 100 100" preserveAspectRatio="none">${l}</svg>`;

/* --- 裁切器（移植自 capture/index.html：固定框 + 移動/縮放底圖，原解析度裁切）--- */
const MIN_CROP_PX = 600, AUTOFIT_FILL = 0.86, BG_DIST_TH = 48, FRAME_RATIO = 0.78;

function renderCropped(){
  $("tabBody").innerHTML = `<div class="pad" style="padding-top:0;">
    <div id="stage">

      <input id="zoom" type="range" min="1" max="5" step="0.01" value="1" style="flex:1;accent-color:#2563eb;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3M11 8v6M8 11h6"/></svg>
      <div id="resetCrop" style="font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;">重設</div></div>
    <div id="resInfo" style="font-size:12px;text-align:center;margin-top:8px;color:var(--muted);"></div>
    <div class="row" style="margin-top:16px;">

  loadCropImage(S.cap.file);
  $("zoom").oninput=()=>{ cropper.zoom=+$("zoom").value; reflowCrop(false); };
  $("resetCrop").onclick=()=>{ $("zoom").value=1; cropper.zoom=1; reflowCrop(true); autoFit(); };
  $("retake").onclick=()=>{ S.cap.phase="aim"; renderCapture(); setTimeout(()=>$("pieceInput").click(),0); };
  $("recognize").onclick=recognize;
  bindCropGestures($("stage"));
}
/* 單指拖曳平移 + 雙指捏合縮放（手機上「縮放」的自然手勢，與下方滑桿同步驅動 cropper.zoom，
   確保縮放後 recognize() 真的裁到放大的區域。stage 設 touch-action:none 才不會被瀏覽器手勢吃掉）。*/
function bindCropGestures(stage){
  const ptrs=new Map(); let pinch=null;
  stage.addEventListener("pointerdown",(e)=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY}); stage.setPointerCapture(e.pointerId);
    if(ptrs.size>=2){ // 進入捏合：記錄初始指距/縮放與雙指中點下的影像座標當錨點
      cropper.drag=null; const p=[...ptrs.values()],t=cropper.tf,r=stage.getBoundingClientRect();
      const mx=(p[0].x+p[1].x)/2,my=(p[0].y+p[1].y)/2;
      pinch={ d0:Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1, z0:cropper.zoom,
        ix:(mx-r.left-t.tx)/t.s, iy:(my-r.top-t.ty)/t.s };
    } else { cropper.drag={x:e.clientX,y:e.clientY,tx:cropper.tf.tx,ty:cropper.tf.ty}; }
  });
  stage.addEventListener("pointermove",(e)=>{
    if(!ptrs.has(e.pointerId)) return; ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinch && ptrs.size>=2){ // 以中點為錨點縮放：縮放後該影像點仍對齊中點
      const p=[...ptrs.values()],r=stage.getBoundingClientRect();
      const mx=(p[0].x+p[1].x)/2,my=(p[0].y+p[1].y)/2;
      const d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y),zEl=$("zoom");

    }

  const end=(e)=>{ ptrs.delete(e.pointerId); if(ptrs.size<2) pinch=null;
    if(ptrs.size===1){ const v=[...ptrs.values()][0]; cropper.drag={x:v.x,y:v.y,tx:cropper.tf.tx,ty:cropper.tf.ty}; }
    else if(ptrs.size===0){ cropper.drag=null; } };

}
function loadCropImage(file){
  const img=new Image();
  img.onload=()=>{ const c=$("frozen"); cropper.frozen=c; cropper.w=img.naturalWidth; cropper.h=img.naturalHeight;
    c.width=cropper.w; c.height=cropper.h; c.getContext("2d").drawImage(img,0,0); c.style.display="block";
    URL.revokeObjectURL(img.src); reflowCrop(true); if(!autoFit()) updateResInfo(); };
  img.onerror=()=>{ URL.revokeObjectURL(img.src); toast("無法讀取影像，請重拍",true); S.cap.phase="aim"; renderCapture(); };
  img.src=URL.createObjectURL(file);
}
function computeFrame(){ const st=$("stage").getBoundingClientRect(); const size=Math.min(st.width,st.height)*FRAME_RATIO;
  cropper.frame={x:(st.width-size)/2,y:(st.height-size)/2,size};
  const b=$("cropBox"); b.style.left=cropper.frame.x+"px"; b.style.top=cropper.frame.y+"px"; b.style.width=size+"px"; b.style.height=size+"px"; }
function clampPan(){ const f=cropper.frame,t=cropper.tf; const w=cropper.w*t.s,h=cropper.h*t.s;
  t.tx=Math.min(f.x,Math.max(f.x+f.size-w,t.tx)); t.ty=Math.min(f.y,Math.max(f.y+f.size-h,t.ty)); }
function applyCrop(){ clampPan(); const t=cropper.tf; cropper.frozen.style.transform=`translate(${t.tx}px,${t.ty}px) scale(${t.s})`; updateResInfo(); }
function reflowCrop(recenter){ const t=cropper.tf, old=t.s; computeFrame(); const f=cropper.frame;
  const cx=f.x+f.size/2, cy=f.y+f.size/2; const ix=old?(cx-t.tx)/old:cropper.w/2, iy=old?(cy-t.ty)/old:cropper.h/2;
  t.baseS=Math.max(f.size/cropper.w,f.size/cropper.h); t.s=t.baseS*cropper.zoom;
  if(recenter){ t.tx=cx-cropper.w*t.s/2; t.ty=cy-cropper.h*t.s/2; } else { t.tx=cx-ix*t.s; t.ty=cy-iy*t.s; } applyCrop(); }
function currentCropPx(){ return cropper.tf.s?Math.round(cropper.frame.size/cropper.tf.s):0; }
function updateResInfo(){ const el=$("resInfo"); if(!el)return; const px=currentCropPx(); const ok=px>=MIN_CROP_PX;
  el.textContent = ok?`裁切解析度 ${px}px ✓`:`裁切僅 ${px}px：偏小，建議靠近或把縮放調回 1`; el.style.color=ok?"#16a34a":"#e5484d"; }
function detectPieceBBox(){
  const N=240, sc=N/Math.max(cropper.w,cropper.h);
  const w=Math.max(1,Math.round(cropper.w*sc)), h=Math.max(1,Math.round(cropper.h*sc));
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  const ctx=c.getContext("2d",{willReadFrequently:true}); ctx.drawImage(cropper.frozen,0,0,w,h);
  const d=ctx.getImageData(0,0,w,h).data;
  const corners=[[1,1],[w-2,1],[1,h-2],[w-2,h-2]]; const rs=[],gs=[],bs=[];
  for(const [x,y] of corners){ const i=(y*w+x)*4; rs.push(d[i]); gs.push(d[i+1]); bs.push(d[i+2]); }
  const med=a=>{ const s=a.slice().sort((p,q)=>p-q); return (s[(s.length-1)>>1]+s[s.length>>1])/2; };
  const br=med(rs),bg=med(gs),bb=med(bs); let minx=w,miny=h,maxx=-1,maxy=-1,cnt=0;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){ const i=(y*w+x)*4; const dr=d[i]-br,dg=d[i+1]-bg,db=d[i+2]-bb;
    if(dr*dr+dg*dg+db*db>BG_DIST_TH*BG_DIST_TH){ if(x<minx)minx=x; if(x>maxx)maxx=x; if(y<miny)miny=y; if(y>maxy)maxy=y; cnt++; } }
  if(maxx<0||cnt<w*h*0.01) return null;
  const bw=maxx-minx+1, bh=maxy-miny+1; if(bw>w*0.97&&bh>h*0.97) return null;
  const pad=0.06;
  return { x:Math.max(0,(minx-bw*pad)/sc), y:Math.max(0,(miny-bh*pad)/sc),
    w:Math.min(cropper.w,(maxx+bw*pad)/sc)-Math.max(0,(minx-bw*pad)/sc),
    h:Math.min(cropper.h,(maxy+bh*pad)/sc)-Math.max(0,(miny-bh*pad)/sc) };
}
function autoFit(){
  const bb=detectPieceBBox(); if(!bb) return false; computeFrame(); const f=cropper.frame,t=cropper.tf;
  t.baseS=Math.max(f.size/cropper.w,f.size/cropper.h); t.s=f.size*AUTOFIT_FILL/Math.max(bb.w,bb.h);
  let z=t.s/t.baseS; const zEl=$("zoom"); if(z<+zEl.min){ z=+zEl.min; t.s=t.baseS*z; } if(z>+zEl.max) zEl.max=z.toFixed(2);
  zEl.value=z; cropper.zoom=z; const cx=f.x+f.size/2, cy=f.y+f.size/2;
  t.tx=cx-(bb.x+bb.w/2)*t.s; t.ty=cy-(bb.y+bb.h/2)*t.s; applyCrop(); toast("已自動框住單片，可再微調"); return true;
}
async function recognize(){

  const side=Math.max(1,Math.round(sSide));
  if(side<MIN_CROP_PX && !confirm(`裁切僅 ${side}px（建議 ≥${MIN_CROP_PX}px），辨識率可能偏低。仍要辨識嗎？`)) return;
  const out=document.createElement("canvas"); out.width=side; out.height=side;
  out.getContext("2d").drawImage(cropper.frozen,sx,sy,sSide,sSide,0,0,side,side);
  const blob=await new Promise(r=>out.toBlob(r,"image/jpeg",0.92)); if(!blob) return toast("產生影像失敗",true);

  const fd=new FormData(); fd.append("image",blob,"piece.jpg");
  try{
    const res=await api.json(`/api/projects/${S.project.id}/locate`,{method:"POST",body:fd});
    S.cap.located=res; S.cap.pieceId=res.piece_id; S.cap.markConfirmed=true; S.cap.phase="result";
    await refreshPieces(); renderApp();
  }catch(e){ toast("辨識失敗："+e.message,true); S.cap.phase="cropped"; renderCapture(); }
}
function renderRecognizing(){
  $("tabBody").innerHTML = `<div class="pad" style="padding-top:0;">
    <div id="stage" style="display:flex;align-items:center;justify-content:center;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
        <div class="spinner"></div><div style="color:#e2e8f0;font-size:14px;font-weight:600;">比對完成圖中…</div></div></div></div>`;
}
function renderResult(){
  const p=S.project, loc=S.cap.located;
  const has = loc && loc.pred_row;
  const conf = loc&&loc.confidence!=null?Math.round(loc.confidence*100):null;
  let banner;
  if(has && loc.certain){
    banner = `<div style="display:flex;align-items:center;gap:10px;background:var(--okbg);border:1px solid var(--okline);border-radius:14px;padding:12px 14px;margin-bottom:14px;">
      <div style="width:36px;height:36px;border-radius:50%;background:#16a34a;display:flex;align-items:center;justify-content:center;flex:none;">${SVG.check()}</div>
      <div style="flex:1;"><div style="font-size:15px;font-weight:800;color:#14532d;">找到位置了！</div>
        <div style="font-size:12px;color:#16a34a;font-weight:600;">符合度 ${conf}% · 第 ${loc.pred_row} 列 · 第 ${loc.pred_col} 行</div></div></div>`;
  } else if(has){
    const rh = loc.region_hint||{};
    const rng = rh.row_range?`建議在 列 ${rh.row_range[0]}~${rh.row_range[1]}、行 ${rh.col_range[0]}~${rh.col_range[1]} 範圍內找`:"位置不唯一，請參考下方候選或自行調整";
    banner = `<div style="display:flex;gap:10px;background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:22px;">⚠️</div><div style="flex:1;"><div style="font-size:14px;font-weight:800;color:#92400e;">位置不太確定</div>
        <div style="font-size:12px;color:#b45309;margin-top:2px;">${rng}（符合度 ${conf}%，僅供參考）</div></div></div>`;
  } else {
    banner = `<div style="display:flex;gap:10px;background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:12px 14px;margin-bottom:14px;">
      <div style="font-size:22px;">😕</div><div style="flex:1;"><div style="font-size:14px;font-weight:800;color:#991b1b;">這片不好辨識</div>
        <div style="font-size:12px;color:#b91c1c;margin-top:2px;">純色/低紋理片本來就難。可自行輸入位置，或先跳過拍有圖案的片。</div></div></div>`;
  }
  // 候選 Top-K
  let topk = "";
  if(loc&&loc.top_cells&&loc.top_cells.length>1){
    topk = `<div class="section" style="margin:4px 2px 8px;">其他候選位置</div><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">`+
      loc.top_cells.slice(0,5).map((c,i)=>{ const g=c.grid_pos||c.gridPos; if(!g) return "";
        return `<div class="topk" data-r="${g[0]}" data-c="${g[1]}" style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;">
          <span style="font-size:13px;font-weight:700;">第 ${i+1} 名：第 ${g[0]} 列 · 第 ${g[1]} 行</span>
          <span style="font-size:12px;color:var(--soft);">分數 ${(c.score!=null?c.score.toFixed(2):'-')}</span></div>`; }).join("")+`</div>`;
  }
  const dr = (S.cap.editRow!=null?S.cap.editRow:loc&&loc.pred_row)||"";
  const dc = (S.cap.editCol!=null?S.cap.editCol:loc&&loc.pred_col)||"";
  const locExtra = has?`<div class="loc-marker" style="left:${(loc.pred_col-1)/p.cols*100}%;top:${(loc.pred_row-1)/p.rows*100}%;width:${100/p.cols}%;height:${100/p.rows}%;"></div>`:"";
  $("tabBody").innerHTML = `<div class="pad" style="padding-top:0;">
    ${banner}
    ${refMap(locExtra)}
    ${topk}
    <div class="section" style="margin:14px 2px 8px;">確認落點（可手動修正）</div>
    <div class="row" style="margin-bottom:14px;">
      <div style="flex:1;" class="card"><div style="padding:8px 12px;"><div style="font-size:11px;color:var(--soft);font-weight:600;">列</div>
        <input id="editRow" type="number" min="1" max="${p.rows}" inputmode="numeric" value="${dr}" style="width:100%;font-size:20px;font-weight:800;border:none;outline:none;background:transparent;"></div></div>
      <div style="flex:1;" class="card"><div style="padding:8px 12px;"><div style="font-size:11px;color:var(--soft);font-weight:600;">行</div>
        <input id="editCol" type="number" min="1" max="${p.cols}" inputmode="numeric" value="${dc}" style="width:100%;font-size:20px;font-weight:800;border:none;outline:none;background:transparent;"></div></div></div>
    <div id="markRow" style="display:flex;align-items:center;gap:11px;padding:13px 14px;border-radius:14px;border:1px solid var(--line2);background:#fff;cursor:pointer;">
      <div id="markCb" style="width:22px;height:22px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;
        border:${S.cap.markConfirmed?'none':'2px solid #cbd5e1'};background:${S.cap.markConfirmed?'#2563eb':'#fff'};">${S.cap.markConfirmed?SVG.check():''}</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:700;">標記為已確認位置</div>
        <div style="font-size:12px;color:var(--soft);margin-top:1px;">勾選後標進全圖；不勾選僅留存單片紀錄</div></div></div>
    <div class="row" style="margin-top:12px;">
      <button class="btn ghost" id="reRecognize" style="flex:1;">重拍</button>
      <button class="btn ok" id="confirmLoc" style="flex:2;">確認儲存</button></div></div>`;
  $("editRow").oninput=(e)=>S.cap.editRow=+e.target.value||null;
  $("editCol").oninput=(e)=>S.cap.editCol=+e.target.value||null;
  $("markRow").onclick=()=>{ S.cap.markConfirmed=!S.cap.markConfirmed; renderResult(); };
  $("reRecognize").onclick=()=>{ S.cap={phase:"aim",file:null,located:null,resultStyle:"zoom",markConfirmed:true,pieceId:null}; renderCapture(); setTimeout(()=>$("pieceInput").click(),0); };
  $("confirmLoc").onclick=confirmLocation;
  $("tabBody").querySelectorAll(".topk").forEach(el=>el.onclick=()=>{ S.cap.editRow=+el.dataset.r; S.cap.editCol=+el.dataset.c; renderResult(); });
}
async function confirmLocation(){
  const p=S.project; const row=S.cap.editRow!=null?S.cap.editRow:(S.cap.located&&S.cap.located.pred_row);
  const col=S.cap.editCol!=null?S.cap.editCol:(S.cap.located&&S.cap.located.pred_col);
  const pieceId=S.cap.pieceId;
  if(S.cap.markConfirmed){
    if(!(row>=1&&row<=p.rows&&col>=1&&col<=p.cols)) return toast(`請輸入有效的列(1~${p.rows})與行(1~${p.cols})`,true);
  }
  try{
    if(S.cap.markConfirmed){
      await api.json(`/api/projects/${p.id}/pieces/${pieceId}/confirm`,
        {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({row,col,confirmed:true})});
      toast(`已確認：第 ${row} 列 · 第 ${col} 行`);
    } else { toast("已留存單片紀錄（未標記）"); }
    S.cap={phase:"aim",file:null,located:null,resultStyle:"zoom",markConfirmed:true,pieceId:null};
    await refreshPieces(); renderApp();
  }catch(e){ toast(e.message,true); }
}

/* ============================ 啟動 ============================ */
render();
</script>
</body>
</html>
