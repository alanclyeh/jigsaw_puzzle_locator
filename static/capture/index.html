<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拼圖單片採集</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --accent:#2f81f7; --ok:#3fb950; --warn:#f85149; --text:#e6edf3; --muted:#8b949e; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,"Helvetica Neue",system-ui,sans-serif; }
  body { display:flex; flex-direction:column; }
  header { padding:10px 14px; font-size:16px; font-weight:600; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  header .sub { font-size:12px; color:var(--muted); font-weight:400; }
  #stage { position:relative; flex:1; min-height:0; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #frozen { display:none; position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; }
  /* 編輯狀態：固定大小裁切框（不可調），底圖可移動/縮放去對齊 */
  #cropLayer { position:absolute; inset:0; display:none; touch-action:none; cursor:grab; }
  #cropLayer:active { cursor:grabbing; }
  #cropBox { position:absolute; border:2px solid var(--ok); box-shadow:0 0 0 9999px rgba(0,0,0,.5); pointer-events:none; }
  #placeholder { color:var(--muted); font-size:15px; text-align:center; padding:0 30px; line-height:1.7; }
  .controls { padding:10px 14px; border-top:1px solid var(--line); background:var(--panel); display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .row label { font-size:13px; color:var(--muted); min-width:46px; }
  input[type=number] { width:90px; padding:10px; font-size:18px; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; }
  input[type=range] { flex:1; }
  button, .btn { padding:14px; font-size:17px; font-weight:600; border:none; border-radius:10px; color:#fff; background:var(--accent); flex:1; text-align:center; display:block; }
  button.ghost, .btn.ghost { background:#21262d; border:1px solid var(--line); }
  button:disabled { opacity:.4; }
  .pill { font-size:12px; color:var(--muted); }
  #toast { position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:#1f6feb; color:#fff; padding:10px 16px; border-radius:20px; font-size:14px; opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center; }
  #toast.show { opacity:1; }
  #toast.err { background:var(--warn); }
  .hint { font-size:12px; color:var(--muted); }
  /* 拍攝指示卡 */
  #howto { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:14px; }
  #howto h2 { margin:0 0 12px; font-size:15px; font-weight:600; display:flex; align-items:center; gap:6px; }
  .howto-eg { display:flex; gap:12px; margin-bottom:14px; }
  .howto-eg figure { flex:1; margin:0; text-align:center; }
  .eg-frame { position:relative; aspect-ratio:3/4; border:2px solid var(--line); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .eg-frame.good { border-color:var(--ok); }
  .eg-frame.bad { border-color:var(--warn); }
  .eg-piece { background:#6b7785; border-radius:4px; }
  .eg-frame.good .eg-piece { width:48%; height:48%; }
  .eg-frame.bad .eg-piece { width:96%; height:96%; }
  .eg-tag { position:absolute; bottom:4px; left:0; right:0; font-size:11px; color:var(--muted); }
  .howto-eg figcaption { margin-top:6px; font-size:12px; font-weight:600; }
  figure.ok figcaption { color:var(--ok); }
  figure.no figcaption { color:var(--warn); }
  #howto ul { list-style:none; margin:0; padding:0; }
  #howto li { display:flex; gap:8px; padding:9px 0; font-size:14px; line-height:1.5; border-top:1px solid var(--line); }
  #howto li b { color:var(--ok); font-weight:600; }
  #howto .ic { flex:0 0 20px; text-align:center; }
  #howto .gotit { margin-top:12px; }
  .howto-link { font-size:13px; color:var(--accent); background:none; border:none; padding:6px 0; text-align:left; flex:initial; font-weight:600; }
  #howto .note { margin:10px 0 0; padding-top:9px; border-top:1px solid var(--line); font-size:13px; color:var(--warn); line-height:1.6; }
</style>
</head>
<body>
<header>
  <span>🧩 拼圖單片採集</span>
  <span class="sub" id="cfgInfo">載入設定中…</span>
</header>

<div id="stage">
  <div id="placeholder">用相機拍一張單片<br>拍完可在綠框內裁切（原解析度）</div>
  <canvas id="frozen"></canvas>
  <div id="cropLayer">
    <div id="cropBox"></div>
  </div>
</div>

<div class="controls">
  <!-- 起始：用原生相機拍照 -->
  <div id="startControls">
    <div class="row">
      <label class="btn" for="fileInput">📷 拍照（開啟相機）</label>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
    </div>
    <div id="howto">
      <h2>📸 拍單片前，先看這裡</h2>
      <div class="howto-eg">
        <figure class="ok">
          <div class="eg-frame good"><div class="eg-piece"></div><span class="eg-tag">約佔一半</span></div>
          <figcaption>✓ 好</figcaption>
        </figure>
        <figure class="no">
          <div class="eg-frame bad"><div class="eg-piece"></div><span class="eg-tag">太近 → 糊</span></div>
          <figcaption>✕ 不要塞滿</figcaption>
        </figure>
      </div>
      <ul>
        <li><span class="ic">📏</span><span>手機離單片約一個手掌高，<b>單片佔半個畫面</b>就好，不用塞滿。</span></li>
        <li><span class="ic">🎯</span><span>點一下螢幕上的單片對焦，<b>畫面清楚</b>再拍；糊掉就退遠一點。</span></li>
        <li><span class="ic">💡</span><span><b>關閃光燈</b>，光從側面來，表面別有反光亮點。</span></li>
        <li><span class="ic">🟩</span><span>放在<b>乾淨單色墊</b>上，整片平放、置中、一次一片。</span></li>
      </ul>
      <p class="note">⚠️ 純色片（天空、邊角、單一色塊）本身沒花紋，怎麼拍都難辨識，可先跳過、優先拍有圖案的片。</p>
      <button class="gotit" id="gotitBtn">知道了，開始拍</button>
    </div>
    <div class="row">
      <button class="howto-link" id="howtoLink" style="display:none">？拍攝說明</button>
    </div>
    <div class="hint">拍完回到此頁，在綠框內裁切（原解析度）。</div>
  </div>

  <!-- 編輯：固定框 + 移動/縮放底圖，原解析度裁切 -->
  <div id="editControls" style="display:none;">
    <div class="row">
      <label>縮放</label>
      <input type="range" id="zoom" min="1" max="5" step="0.01" value="1">
      <span class="pill">拖曳移動、縮放底圖，讓單片落在綠框內</span>
    </div>
    <div class="row">
      <label>列 row</label>
      <input type="number" id="rowInput" min="1" step="1" inputmode="numeric">
      <label>行 col</label>
      <input type="number" id="colInput" min="1" step="1" inputmode="numeric">
      <span class="pill" id="cellInfo"></span>
    </div>
    <div class="row">
      <button class="ghost" id="retakeBtn">↩︎ 重拍</button>
      <button id="saveBtn">💾 儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const frozen = $("frozen"), stage = $("stage");
const cropLayer = $("cropLayer"), cropBox = $("cropBox");
let cfg = { rows: 40, cols: 25 };
let captures = [];          // [{col,row,count}]
let frozenW = 0, frozenH = 0;   // 凍結影像原始像素尺寸

// ---------- 設定 / 已採集統計 ----------
async function loadConfig() {
  try {
    cfg = await (await fetch("/api/config")).json();
  } catch (e) {}
  $("cfgInfo").textContent = `${cfg.rows} 列 × ${cfg.cols} 行 = ${cfg.total_pieces ?? cfg.rows*cfg.cols} 片`;
  $("rowInput").max = cfg.rows;
  $("colInput").max = cfg.cols;
}
async function loadCaptures() {
  try { captures = (await (await fetch("/api/captures")).json()).cells || []; } catch (e) {}
}
function cellCount(col, row) {
  const c = captures.find((x) => x.col === col && x.row === row);
  return c ? c.count : 0;
}

// ---------- 載入相機照片（原生相機，全解析度）----------
function loadPhoto(file) {
  const img = new Image();
  img.onload = () => {
    frozenW = img.naturalWidth; frozenH = img.naturalHeight;
    frozen.width = frozenW; frozen.height = frozenH;
    frozen.getContext("2d").drawImage(img, 0, 0);
    enterEdit();
    URL.revokeObjectURL(img.src);
  };
  img.onerror = () => { URL.revokeObjectURL(img.src); toast("無法讀取此影像，請重拍", true); };
  img.src = URL.createObjectURL(file);
}

// ---------- 固定框 + 移動/縮放底圖（原解析度裁切，不縮放）----------
const FRAME_RATIO = 0.72;    // 固定框佔畫面短邊比例（僅顯示用）
// 輸出不重採樣：截圖以原解析度裁切，尺寸 = 框對應的原始像素邊長，
// 隨縮放倍率而變（zoom=1 時約等於照片短邊解析度，為最高可得解析度）。
let frame = { x: 0, y: 0, size: 0 };       // 固定框在 stage 的矩形
let tf = { baseS: 1, s: 1, tx: 0, ty: 0 }; // 影像變換：stage 座標 = (tx,ty) + img_px * s
const zoom = $("zoom");

function computeFrame() {
  const sr = stage.getBoundingClientRect();
  const size = Math.min(sr.width, sr.height) * FRAME_RATIO;
  frame = { x: (sr.width - size) / 2, y: (sr.height - size) / 2, size };
  cropBox.style.left = frame.x + "px"; cropBox.style.top = frame.y + "px";
  cropBox.style.width = frame.size + "px"; cropBox.style.height = frame.size + "px";
}

// 夾限平移：固定框內必須永遠被影像覆蓋（不留空白邊）
function clampPan() {
  const w = frozenW * tf.s, h = frozenH * tf.s;
  tf.tx = Math.min(frame.x, Math.max(frame.x + frame.size - w, tf.tx));
  tf.ty = Math.min(frame.y, Math.max(frame.y + frame.size - h, tf.ty));
}
function applyTransform() {
  clampPan();
  frozen.style.transform = `translate(${tf.tx}px, ${tf.ty}px) scale(${tf.s})`;
}

// 重排：依目前 zoom 重算尺度。recenter=true 把影像置中；否則維持固定框中心對到的影像點
function reflow(recenter) {
  const oldS = tf.s;
  computeFrame();
  const cx = frame.x + frame.size / 2, cy = frame.y + frame.size / 2;
  const ix = oldS ? (cx - tf.tx) / oldS : frozenW / 2;
  const iy = oldS ? (cy - tf.ty) / oldS : frozenH / 2;
  tf.baseS = Math.max(frame.size / frozenW, frame.size / frozenH); // zoom=1 時剛好覆蓋固定框
  tf.s = tf.baseS * (+zoom.value);
  if (recenter) { tf.tx = cx - frozenW * tf.s / 2; tf.ty = cy - frozenH * tf.s / 2; }
  else { tf.tx = cx - ix * tf.s; tf.ty = cy - iy * tf.s; }
  applyTransform();
}

function enterEdit() {
  $("placeholder").style.display = "none";
  frozen.style.display = "block"; cropLayer.style.display = "block";
  $("startControls").style.display = "none"; $("editControls").style.display = "block";
  zoom.value = 1;
  reflow(true);   // 置中、整片可見，使用者再縮放/移動對框
  refreshCellInfo();
}

// 拖曳平移底圖
let drag = null;
function pointerXY(e) {
  const sr = stage.getBoundingClientRect();
  return { x: e.clientX - sr.left, y: e.clientY - sr.top };
}
cropLayer.addEventListener("pointerdown", (e) => {
  drag = { start: pointerXY(e), tx: tf.tx, ty: tf.ty };
  cropLayer.setPointerCapture(e.pointerId); e.preventDefault();
});
cropLayer.addEventListener("pointermove", (e) => {
  if (!drag) return;
  const p = pointerXY(e);
  tf.tx = drag.tx + (p.x - drag.start.x);
  tf.ty = drag.ty + (p.y - drag.start.y);
  applyTransform();
  e.preventDefault();
});
const endDrag = () => { drag = null; };
cropLayer.addEventListener("pointerup", endDrag);
cropLayer.addEventListener("pointercancel", endDrag);

// 縮放（滑桿 / 滾輪），以固定框中心為錨點
function setZoom(v) {
  zoom.value = Math.min(+zoom.max, Math.max(+zoom.min, v));
  reflow(false);
}
zoom.addEventListener("input", () => reflow(false));
cropLayer.addEventListener("wheel", (e) => {
  e.preventDefault();
  setZoom(+zoom.value * (e.deltaY < 0 ? 1.08 : 0.926));
}, { passive: false });

// ---------- 行列資訊 ----------
function refreshCellInfo() {
  const col = +$("colInput").value, row = +$("rowInput").value;
  if (col && row) $("cellInfo").textContent = `此格已有 ${cellCount(col, row)} 張`;
  else $("cellInfo").textContent = "";
}
$("colInput").addEventListener("input", refreshCellInfo);
$("rowInput").addEventListener("input", refreshCellInfo);

// ---------- 儲存 ----------
function toast(msg, isErr) {
  const t = $("toast"); t.textContent = msg; t.className = "show" + (isErr ? " err" : "");
  setTimeout(() => (t.className = ""), 2600);
}
async function save() {
  const col = +$("colInput").value, row = +$("rowInput").value;
  if (!(col >= 1 && col <= cfg.cols)) return toast(`行 col 須介於 1~${cfg.cols}`, true);
  if (!(row >= 1 && row <= cfg.rows)) return toast(`列 row 須介於 1~${cfg.rows}`, true);

  // 固定框 → 原始影像像素座標。不縮放、只裁切：輸出維持原解析度（1:1 取像素）
  const sx = (frame.x - tf.tx) / tf.s, sy = (frame.y - tf.ty) / tf.s;
  const sSide = frame.size / tf.s;
  const side = Math.max(1, Math.round(sSide));
  const out = document.createElement("canvas");
  out.width = side; out.height = side;
  out.getContext("2d").drawImage(frozen, sx, sy, sSide, sSide, 0, 0, side, side);

  const blob = await new Promise((r) => out.toBlob(r, "image/jpeg", 0.92));
  if (!blob) return toast("產生影像失敗，請重拍", true);
  const fd = new FormData();
  fd.append("image", blob, "piece.jpg");
  fd.append("col", col); fd.append("row", row);
  $("saveBtn").disabled = true;
  try {
    const res = await fetch("/api/captures", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "儲存失敗");
    toast(`已存 ${data.filename}（${side}px，此格第 ${data.total_in_cell} 張）`);
    await loadCaptures();
    backToStart();
  } catch (e) {
    toast(e.message, true);
  } finally {
    $("saveBtn").disabled = false;
  }
}

function backToStart() {
  frozen.style.display = "none"; cropLayer.style.display = "none";
  $("placeholder").style.display = "block";
  $("editControls").style.display = "none"; $("startControls").style.display = "block";
  $("fileInput").value = "";   // 清空才能重新選/拍同一張
}

// ---------- 綁定 ----------
$("fileInput").addEventListener("change", (e) => { if (e.target.files[0]) loadPhoto(e.target.files[0]); });
$("retakeBtn").addEventListener("click", () => { backToStart(); $("fileInput").click(); });
$("saveBtn").addEventListener("click", save);
window.addEventListener("resize", () => { if (cropLayer.style.display === "block") reflow(false); });

// ---------- 拍攝指示卡：首次展開，看過後收合成連結 ----------
function showHowto(show) {
  $("howto").style.display = show ? "block" : "none";
  $("howtoLink").style.display = show ? "none" : "block";
}
$("gotitBtn").addEventListener("click", () => {
  try { localStorage.setItem("howtoSeen", "1"); } catch (e) {}
  showHowto(false);
  $("fileInput").click();   // 順手開相機
});
$("howtoLink").addEventListener("click", () => showHowto(true));
try { showHowto(localStorage.getItem("howtoSeen") !== "1"); } catch (e) { showHowto(true); }

(async function init() {
  await loadConfig();
  await loadCaptures();
})();
</script>
</body>
</html>
