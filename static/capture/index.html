<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拼圖單片採集</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#30363d; --accent:#2f81f7; --ok:#3fb950; --warn:#f85149; --text:#e6edf3; --muted:#8b949e; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,"Helvetica Neue",system-ui,sans-serif; }
  body { display:flex; flex-direction:column; }
  header { padding:10px 14px; font-size:16px; font-weight:600; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  header .sub { font-size:12px; color:var(--muted); font-weight:400; }
  #stage { position:relative; flex:1; min-height:0; background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #video { max-width:100%; max-height:100%; display:block; }
  #frozen { display:none; position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; }
  /* 即時定位框：固定大小、可拖曳移動位置（避開反光/陰影）*/
  #guide { position:absolute; border:2px dashed var(--accent); box-shadow:0 0 0 9999px rgba(0,0,0,.35); display:none; touch-action:none; cursor:move; }
  /* 編輯狀態：固定大小裁切框（不可調），底圖可移動/縮放去對齊 */
  #cropLayer { position:absolute; inset:0; display:none; touch-action:none; cursor:grab; }
  #cropLayer:active { cursor:grabbing; }
  #cropBox { position:absolute; border:2px solid var(--ok); box-shadow:0 0 0 9999px rgba(0,0,0,.5); pointer-events:none; }
  .controls { padding:10px 14px; border-top:1px solid var(--line); background:var(--panel); display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .row label { font-size:13px; color:var(--muted); min-width:46px; }
  input[type=number] { width:90px; padding:10px; font-size:18px; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; }
  input[type=range] { flex:1; }
  .grow { flex:1; }
  button { padding:14px; font-size:17px; font-weight:600; border:none; border-radius:10px; color:#fff; background:var(--accent); flex:1; }
  button.ghost { background:#21262d; border:1px solid var(--line); }
  button:disabled { opacity:.4; }
  .pill { font-size:12px; color:var(--muted); }
  #toast { position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:#1f6feb; color:#fff; padding:10px 16px; border-radius:20px; font-size:14px; opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%; text-align:center; }
  #toast.show { opacity:1; }
  #toast.err { background:var(--warn); }
  #fileFallback { display:none; }
  .hint { font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <span>🧩 拼圖單片採集</span>
  <span class="sub" id="cfgInfo">載入設定中…</span>
</header>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="frozen"></canvas>
  <div id="guide"></div>
  <div id="cropLayer">
    <div id="cropBox"></div>
  </div>
</div>

<div class="controls">
  <!-- 預覽狀態 -->
  <div id="liveControls">
    <div class="row">
      <button id="captureBtn">📸 拍照</button>
    </div>
    <input type="file" id="fileFallback" accept="image/*" capture="environment">
    <div class="hint" id="camHint"></div>
  </div>

  <!-- 編輯狀態 -->
  <div id="editControls" style="display:none;">
    <div class="row">
      <label>縮放</label>
      <input type="range" id="zoom" min="1" max="5" step="0.01" value="1">
      <span class="pill">拖曳移動、縮放底圖，讓單片填滿固定框</span>
    </div>
    <div class="row">
      <label>列 row</label>
      <input type="number" id="rowInput" min="1" step="1" inputmode="numeric">
      <label>行 col</label>
      <input type="number" id="colInput" min="1" step="1" inputmode="numeric">
      <span class="pill" id="cellInfo"></span>
    </div>
    <div class="row">
      <button class="ghost" id="retakeBtn">↩︎ 重拍</button>
      <button id="saveBtn">💾 儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const video = $("video"), frozen = $("frozen"), guide = $("guide"), stage = $("stage");
const cropLayer = $("cropLayer"), cropBox = $("cropBox");
let cfg = { rows: 40, cols: 25 };
let captures = [];          // [{col,row,count}]
let frozenW = 0, frozenH = 0;   // 凍結影像原始像素尺寸

// ---------- 設定 / 已採集統計 ----------
async function loadConfig() {
  try {
    cfg = await (await fetch("/api/config")).json();
  } catch (e) {}
  $("cfgInfo").textContent = `${cfg.rows} 列 × ${cfg.cols} 行 = ${cfg.total_pieces ?? cfg.rows*cfg.cols} 片`;
  $("rowInput").max = cfg.rows;
  $("colInput").max = cfg.cols;
}
async function loadCaptures() {
  try { captures = (await (await fetch("/api/captures")).json()).cells || []; } catch (e) {}
}
function cellCount(col, row) {
  const c = captures.find((x) => x.col === col && x.row === row);
  return c ? c.count : 0;
}

// ---------- 定位框（即時預覽，固定大小、可拖曳位置以避開反光/陰影）----------
const GUIDE_RATIO = 0.62;               // 固定框佔畫面短邊比例
let guidePos = { fx: 0.5, fy: 0.5 };    // 框在可移動範圍中的比例位置（0~1）
try { guidePos = JSON.parse(localStorage.getItem("guideCenter")) || guidePos; } catch (e) {}

function updateGuide() {
  const r = video.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  if (r.width === 0) return;
  const side = Math.min(r.width, r.height) * GUIDE_RATIO;
  const freeW = Math.max(0, r.width - side), freeH = Math.max(0, r.height - side);
  guide.style.display = "block";
  guide.style.width = guide.style.height = side + "px";
  guide.style.left = (r.left - sr.left + freeW * guidePos.fx) + "px";
  guide.style.top = (r.top - sr.top + freeH * guidePos.fy) + "px";
}

// 拖曳移動定位框（位置記憶於 localStorage）
let gDrag = null;
guide.addEventListener("pointerdown", (e) => {
  gDrag = { start: pointerXY(e), pos: { ...guidePos } };
  guide.setPointerCapture(e.pointerId); e.preventDefault();
});
guide.addEventListener("pointermove", (e) => {
  if (!gDrag) return;
  const r = video.getBoundingClientRect();
  const side = Math.min(r.width, r.height) * GUIDE_RATIO;
  const freeW = Math.max(1, r.width - side), freeH = Math.max(1, r.height - side);
  const p = pointerXY(e);
  guidePos.fx = Math.min(1, Math.max(0, gDrag.pos.fx + (p.x - gDrag.start.x) / freeW));
  guidePos.fy = Math.min(1, Math.max(0, gDrag.pos.fy + (p.y - gDrag.start.y) / freeH));
  updateGuide(); e.preventDefault();
});
function endGuideDrag() {
  if (gDrag) localStorage.setItem("guideCenter", JSON.stringify(guidePos));
  gDrag = null;
}
guide.addEventListener("pointerup", endGuideDrag);
guide.addEventListener("pointercancel", endGuideDrag);

// ---------- 開鏡頭 ----------
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }, audio: false,
    });
    video.srcObject = stream;
    await video.play();
    video.addEventListener("loadedmetadata", updateGuide);
    setTimeout(updateGuide, 300);
    $("camHint").textContent = "拖曳虛線框可避開反光/陰影；對準單片後按拍照。";
  } catch (e) {
    // 退回原生相機（免 HTTPS）：無即時定位框
    video.style.display = "none";
    guide.style.display = "none";
    $("captureBtn").style.display = "none";
    $("fileFallback").style.display = "block";
    $("camHint").textContent = "無法開啟即時鏡頭（需 HTTPS 或權限）。改用相機拍照後上傳，拍完仍可手動裁切。";
  }
}

// ---------- 凍結影像 ----------
// 把即時定位框換算成凍結影像的像素區域 → 截圖即對應此框的位置
function guideRegionInImagePixels() {
  const rv = video.getBoundingClientRect(), gb = guide.getBoundingClientRect();
  if (!rv.width || !gb.width) return null;
  const scale = frozenW / rv.width;   // 影像像素 / CSS px（video 元素無內部留白，等比例）
  const x = Math.max(0, (gb.left - rv.left) * scale);
  const y = Math.max(0, (gb.top - rv.top) * scale);
  const side = Math.min(gb.width * scale, frozenW - x, frozenH - y);
  return { x, y, side };
}

function freezeFromVideo() {
  frozenW = video.videoWidth; frozenH = video.videoHeight;
  frozen.width = frozenW; frozen.height = frozenH;
  frozen.getContext("2d").drawImage(video, 0, 0, frozenW, frozenH);
  enterEdit(guideRegionInImagePixels());
}
function freezeFromFile(file) {
  const img = new Image();
  img.onload = () => {
    frozenW = img.naturalWidth; frozenH = img.naturalHeight;
    frozen.width = frozenW; frozen.height = frozenH;
    frozen.getContext("2d").drawImage(img, 0, 0);
    enterEdit(null);   // 檔案上傳無即時定位框，預設置中
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}

// ---------- 固定框 + 移動/縮放底圖 ----------
const FRAME_RATIO = 0.72;    // 固定框佔畫面短邊比例（僅顯示用）
const OUTPUT_SIZE = 720;     // 固定輸出邊長(px) → 所有截圖尺寸一致
let frame = { x: 0, y: 0, size: 0 };       // 固定框在 stage 的矩形
let tf = { baseS: 1, s: 1, tx: 0, ty: 0 }; // 影像變換：stage 座標 = (tx,ty) + img_px * s
const zoom = $("zoom");

function computeFrame() {
  const sr = stage.getBoundingClientRect();
  const size = Math.min(sr.width, sr.height) * FRAME_RATIO;
  frame = { x: (sr.width - size) / 2, y: (sr.height - size) / 2, size };
  cropBox.style.left = frame.x + "px"; cropBox.style.top = frame.y + "px";
  cropBox.style.width = frame.size + "px"; cropBox.style.height = frame.size + "px";
}

// 夾限平移：固定框內必須永遠被影像覆蓋（不留空白邊）
function clampPan() {
  const w = frozenW * tf.s, h = frozenH * tf.s;
  tf.tx = Math.min(frame.x, Math.max(frame.x + frame.size - w, tf.tx));
  tf.ty = Math.min(frame.y, Math.max(frame.y + frame.size - h, tf.ty));
}
function applyTransform() {
  clampPan();
  frozen.style.transform = `translate(${tf.tx}px, ${tf.ty}px) scale(${tf.s})`;
}

// 重排：依目前 zoom 重算尺度。recenter=true 把影像置中；否則維持固定框中心對到的影像點
function reflow(recenter) {
  const oldS = tf.s;
  computeFrame();
  const cx = frame.x + frame.size / 2, cy = frame.y + frame.size / 2;
  const ix = oldS ? (cx - tf.tx) / oldS : frozenW / 2;
  const iy = oldS ? (cy - tf.ty) / oldS : frozenH / 2;
  tf.baseS = Math.max(frame.size / frozenW, frame.size / frozenH); // zoom=1 時剛好覆蓋固定框
  tf.s = tf.baseS * (+zoom.value);
  if (recenter) { tf.tx = cx - frozenW * tf.s / 2; tf.ty = cy - frozenH * tf.s / 2; }
  else { tf.tx = cx - ix * tf.s; tf.ty = cy - iy * tf.s; }
  applyTransform();
}

function enterEdit(region) {
  if (video.srcObject) video.srcObject.getTracks().forEach((t) => t.stop());
  video.style.display = "none"; guide.style.display = "none";
  frozen.style.display = "block"; cropLayer.style.display = "block";
  $("liveControls").style.display = "none"; $("editControls").style.display = "block";
  computeFrame();
  tf.baseS = Math.max(frame.size / frozenW, frame.size / frozenH); // zoom=1 時剛好覆蓋固定框
  if (region && region.side > 0) {
    // 初始裁切對應拍攝時的定位框：把框住的影像區域置中填入固定取景框
    const z = Math.min(+zoom.max, Math.max(+zoom.min, (frame.size / region.side) / tf.baseS));
    zoom.value = z;
    tf.s = tf.baseS * z;
    const cx = region.x + region.side / 2, cy = region.y + region.side / 2;
    tf.tx = frame.x + frame.size / 2 - cx * tf.s;
    tf.ty = frame.y + frame.size / 2 - cy * tf.s;
    applyTransform();
  } else {
    zoom.value = 1;
    reflow(true);   // 無定位框資訊時置中
  }
  refreshCellInfo();
}

// 拖曳平移底圖
let drag = null;
function pointerXY(e) {
  const sr = stage.getBoundingClientRect();
  return { x: e.clientX - sr.left, y: e.clientY - sr.top };
}
cropLayer.addEventListener("pointerdown", (e) => {
  drag = { start: pointerXY(e), tx: tf.tx, ty: tf.ty };
  cropLayer.setPointerCapture(e.pointerId); e.preventDefault();
});
cropLayer.addEventListener("pointermove", (e) => {
  if (!drag) return;
  const p = pointerXY(e);
  tf.tx = drag.tx + (p.x - drag.start.x);
  tf.ty = drag.ty + (p.y - drag.start.y);
  applyTransform();
  e.preventDefault();
});
const endDrag = () => { drag = null; };
cropLayer.addEventListener("pointerup", endDrag);
cropLayer.addEventListener("pointercancel", endDrag);

// 縮放（滑桿 / 滾輪），以固定框中心為錨點
function setZoom(v) {
  zoom.value = Math.min(+zoom.max, Math.max(+zoom.min, v));
  reflow(false);
}
zoom.addEventListener("input", () => reflow(false));
cropLayer.addEventListener("wheel", (e) => {
  e.preventDefault();
  setZoom(+zoom.value * (e.deltaY < 0 ? 1.08 : 0.926));
}, { passive: false });

// ---------- 行列資訊 ----------
function refreshCellInfo() {
  const col = +$("colInput").value, row = +$("rowInput").value;
  if (col && row) $("cellInfo").textContent = `此格已有 ${cellCount(col, row)} 張`;
  else $("cellInfo").textContent = "";
}
$("colInput").addEventListener("input", refreshCellInfo);
$("rowInput").addEventListener("input", refreshCellInfo);

// ---------- 儲存 ----------
function toast(msg, isErr) {
  const t = $("toast"); t.textContent = msg; t.className = "show" + (isErr ? " err" : "");
  setTimeout(() => (t.className = ""), 2600);
}
async function save() {
  const col = +$("colInput").value, row = +$("rowInput").value;
  if (!(col >= 1 && col <= cfg.cols)) return toast(`行 col 須介於 1~${cfg.cols}`, true);
  if (!(row >= 1 && row <= cfg.rows)) return toast(`列 row 須介於 1~${cfg.rows}`, true);

  // 固定框 → 原始影像像素座標（輸出永遠 OUTPUT_SIZE 正方形，確保每張尺寸一致）
  const sx = (frame.x - tf.tx) / tf.s, sy = (frame.y - tf.ty) / tf.s;
  const sSide = frame.size / tf.s;
  const out = document.createElement("canvas");
  out.width = OUTPUT_SIZE; out.height = OUTPUT_SIZE;
  out.getContext("2d").drawImage(frozen, sx, sy, sSide, sSide, 0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

  const blob = await new Promise((r) => out.toBlob(r, "image/jpeg", 0.92));
  const fd = new FormData();
  fd.append("image", blob, "piece.jpg");
  fd.append("col", col); fd.append("row", row);
  $("saveBtn").disabled = true;
  try {
    const res = await fetch("/api/captures", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "儲存失敗");
    toast(`已存 ${data.filename}（此格第 ${data.total_in_cell} 張）`);
    await loadCaptures();
    retake();
  } catch (e) {
    toast(e.message, true);
  } finally {
    $("saveBtn").disabled = false;
  }
}

function retake() {
  frozen.style.display = "none"; cropLayer.style.display = "none";
  $("editControls").style.display = "none"; $("liveControls").style.display = "block";
  $("fileFallback").value = "";   // 清空才能重新選同一個檔案
  if ($("fileFallback").style.display === "block") { video.style.display = "none"; }
  else { video.style.display = "block"; startCamera(); }
}

// ---------- 綁定 ----------
$("captureBtn").addEventListener("click", freezeFromVideo);
$("retakeBtn").addEventListener("click", retake);
$("saveBtn").addEventListener("click", save);
$("fileFallback").addEventListener("change", (e) => { if (e.target.files[0]) freezeFromFile(e.target.files[0]); });
window.addEventListener("resize", () => {
  if (guide.style.display === "block") updateGuide();
  if (cropLayer.style.display === "block") reflow(false);
});

(async function init() {
  await loadConfig();
  await loadCaptures();
  await startCamera();
})();
</script>
</body>
</html>
